name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Centralised version pins so SDK / NDK / build-tools always agree
  # with what buildozer.spec expects.
  ANDROID_COMPILE_SDK: "35"
  # Bump this whenever a toolchain change (e.g. the Cython pin) needs to
  # invalidate the .buildozer cache even though buildozer.spec itself
  # didn't change - otherwise stale, already-Cythonized C files from a
  # previous run get silently reused.
  CACHE_VERSION: "v2-cython0294"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "25.1.8937393"   # = NDK 25b
  ANDROID_HOME: /home/runner/android-sdk
  ANDROID_SDK_ROOT: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ---------------------------------------------------------------
      # System / native build dependencies that python-for-android (p4a)
      # needs on the host to cross-compile Kivy's C extensions.
      # ---------------------------------------------------------------
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip unzip curl wget \
            build-essential pkg-config \
            autoconf automake libtool libltdl-dev \
            zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev \
            ccache

      # ---------------------------------------------------------------
      # Buildozer + Cython. Cython MUST be pinned to the 0.29.x line.
      # Cython 3.x generates C code that fails to compile for several
      # of Kivy's graphics .pyx files (observed as errors like
      # "member reference type 'int' is not a pointer" in
      # vertex_instructions.c). This is a known incompatibility between
      # current Kivy/python-for-android recipes and Cython 3 - the
      # buildozer maintainers pin below Cython 3.0 for the same reason.
      # ---------------------------------------------------------------
      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install --upgrade "buildozer>=1.5.0" "Cython==0.29.36"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-global-${{ env.CACHE_VERSION }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache Android SDK/NDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}
          key: android-sdk-${{ env.ANDROID_COMPILE_SDK }}-${{ env.ANDROID_BUILD_TOOLS }}-${{ env.ANDROID_NDK_VERSION }}

      # ---------------------------------------------------------------
      # Manually provision the Android SDK command-line tools.
      # We do this ourselves (instead of letting buildozer auto-download
      # the SDK) because buildozer's own SDK bootstrap is a common
      # source of CI failures: missing sdkmanager, unaccepted licenses,
      # and mismatched build-tools. Doing it explicitly here gives full
      # control and guarantees no interactive prompts.
      # ---------------------------------------------------------------
      - name: Install Android SDK command-line tools
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd "$ANDROID_HOME/cmdline-tools"

          # Resolve the current "latest" Linux command-line tools URL from
          # Google's own download page, with a known-good pinned fallback
          # in case the page layout changes.
          CMDLINE_URL=$(curl -fsSL https://developer.android.com/studio | \
            grep -o 'https://dl.google.com/android/repository/commandlinetools-linux-[0-9]*_latest.zip' | \
            head -n1 || true)
          if [ -z "$CMDLINE_URL" ]; then
            CMDLINE_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          fi
          echo "Using command-line tools: $CMDLINE_URL"

          curl -fsSL -o cmdline-tools.zip "$CMDLINE_URL"
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          # sdkmanager requires the tools to live under cmdline-tools/latest
          rm -rf latest
          mv cmdline-tools latest

      - name: Accept all Android SDK licenses
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          mkdir -p "$ANDROID_HOME/licenses"
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses > /dev/null || true

      - name: Install Android platform-tools, build-tools, platform and NDK
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" || true

          # Re-accept licenses once more now that new packages exist -
          # some sdkmanager versions write fresh license files per package.
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses > /dev/null || true

      - name: Create legacy SDK path compatibility symlinks
        run: |
          set -euo pipefail
          # Buildozer's SDK-build-tools check looks for sdkmanager (and
          # friends) at the legacy `tools/bin/` location, even when
          # android.skip_update = True is set in buildozer.spec. Modern
          # sdkmanager only ships under `cmdline-tools/latest/bin/`, so
          # without this symlink buildozer thinks the SDK is missing
          # entirely and aborts.
          mkdir -p "$ANDROID_HOME/tools/bin"
          for tool in sdkmanager avdmanager apkanalyzer; do
            src="$ANDROID_HOME/cmdline-tools/latest/bin/$tool"
            if [ -e "$src" ]; then
              ln -sf "$src" "$ANDROID_HOME/tools/bin/$tool"
            fi
          done
          ls -la "$ANDROID_HOME/tools/bin"

      - name: Verify Android SDK / NDK / aidl are present
        run: |
          set -euo pipefail
          test -x "$ANDROID_HOME/platform-tools/adb"
          test -d "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}"
          test -x "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}/aidl"
          test -d "$ANDROID_HOME/platforms/android-${ANDROID_COMPILE_SDK}"
          test -d "$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}"
          echo "Android SDK looks good:"
          ls "$ANDROID_HOME"

      - name: Point buildozer.spec at the pre-installed SDK/NDK
        run: |
          set -euo pipefail
          # Buildozer's own internal pre-flight check (the one that
          # looks for build-tools/aidl before it even hands off to
          # python-for-android) does not reliably pick up the
          # APP_ANDROID_SDK_PATH / APP_ANDROID_NDK_PATH env-var
          # overrides - it falls back to its default
          # ~/.buildozer/android/platform/android-sdk path for that
          # specific check. Writing the real paths directly into
          # buildozer.spec removes any ambiguity.
          NDK_PATH="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          sed -i "s|^#\?android.sdk_path *=.*|android.sdk_path = $ANDROID_HOME|" buildozer.spec
          sed -i "s|^#\?android.ndk_path *=.*|android.ndk_path = $NDK_PATH|" buildozer.spec
          echo "buildozer.spec now points to:"
          grep -n "^android.sdk_path\|^android.ndk_path" buildozer.spec

      # ---------------------------------------------------------------
      # Build the APK. buildozer.spec now has explicit android.sdk_path
      # / android.ndk_path pointing at the SDK/NDK we installed above,
      # and android.skip_update = True (also in buildozer.spec) tells
      # buildozer not to try to manage the SDK itself. `yes |` is a
      # final safety net so the process can never block on an
      # unexpected interactive prompt.
      # ---------------------------------------------------------------
      - name: Build APK with Buildozer
        run: |
          set -euo pipefail
          yes | buildozer -v android debug 2>&1 | tee "$GITHUB_WORKSPACE/buildozer_full.log" || true
          # If buildozer genuinely failed, there will be no APK and the
          # next step ("Locate built APK") will fail the job with a
          # clear error - so it's safe to not treat `yes`'s harmless
          # broken-pipe exit (SIGPIPE, once buildozer finishes and
          # closes stdin) as a build failure here.

      - name: Show build error summary (only runs if build actually failed)
        if: always()
        run: |
          LOG="$GITHUB_WORKSPACE/buildozer_full.log"
          if [ ! -f "$LOG" ]; then
            echo "No buildozer_full.log found - build step may not have run."
            exit 0
          fi
          if find bin -maxdepth 1 -name "*.apk" 2>/dev/null | grep -q .; then
            echo "APK was produced - skipping error summary."
            exit 0
          fi

          echo "===== Gradle failure block (if this was a gradle/aapt/packaging failure) ====="
          # Gradle always prints one of these markers when a build fails.
          # Print from the FIRST such marker to the end of the file, since
          # that's where the actual causing task/error lives - a generic
          # keyword grep gets flooded by repeated deprecation-warning
          # lines that also contain "fail" and pushes the real signal out
          # of a tail window.
          if grep -nE "FAILURE:|BUILD FAILED|What went wrong" "$LOG" > /dev/null; then
            FIRST_LINE=$(grep -nE "FAILURE:|BUILD FAILED|What went wrong" "$LOG" | head -n1 | cut -d: -f1)
            sed -n "${FIRST_LINE},\$p" "$LOG" | head -n 200
          else
            echo "(no Gradle FAILURE/BUILD FAILED marker found in log)"
          fi

          echo ""
          echo "===== AAPT / manifest / resource errors (if any) ====="
          grep -inE "aapt|AndroidManifest|resource.*error|duplicate.*resource" "$LOG" | tail -n 60 || echo "(none found)"

          echo ""
          echo "===== python-for-android 'Command failed' block (fallback) ====="
          if grep -n "# Command failed:" "$LOG" > /dev/null; then
            LAST_CMD_LINE=$(grep -n "# Command failed:" "$LOG" | tail -n1 | cut -d: -f1)
            sed -n "$((LAST_CMD_LINE>50 ? LAST_CMD_LINE-50 : 1)),${LAST_CMD_LINE}p" "$LOG"
          fi

          echo ""
          echo "===== Last 100 lines of raw output (final fallback) ====="
          tail -n 100 "$LOG"

      - name: Locate built APK
        id: locate_apk
        run: |
          set -euo pipefail
          APK_PATH=$(find bin -maxdepth 1 -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in bin/ - build failed." >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cheap4U-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload full build log (always, for debugging failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: |
            buildozer_full.log
            .buildozer/android/platform/build-*/build.log
          if-no-files-found: ignore
